name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython<3" buildozer

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            libltdl-dev automake autopoint gettext

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set -e
          SDKMANAGER=""
          for p in \
            "$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager" \
            "$HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager" \
            "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          do
            if [ -x "$p" ]; then
              SDKMANAGER="$p"
              break
            fi
          done

          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses || true
          else
            echo "sdkmanager not found yet; Buildozer will provision Android SDK during the build."
          fi

      - name: Build APK
        shell: bash
        run: |
          buildozer android clean
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: bin/*.apk
          if-no-files-found: error
